# AWS Lambda + API Gateway HTTP API via Serverless Framework v3 + serverless-esbuild.
# We use v3 (not v4) so `deploy`/`package` work without a Serverless Dashboard login.
# Deploy from this directory after `pnpm install` at repo root (workspace deps resolved).
service: event-platform-api

frameworkVersion: "3"

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 29
  # ── VPC — required to reach DocumentDB ────────────────────────────────────
  # Set VPC_ID, SUBNET_ID_1, SUBNET_ID_2 in .env to the private subnets where
  # your DocumentDB cluster lives. Then add the exported LambdaSecurityGroupId
  # as an inbound rule on the DocumentDB security group (port 27017).
  # Private subnets need a NAT Gateway for outbound calls (OpenAI, JWT JWKS).
  vpc:
    securityGroupIds:
      - Fn::GetAtt: [LambdaSecurityGroup, GroupId]
    subnetIds:
      - ${env:SUBNET_ID_1}
      - ${env:SUBNET_ID_2}
  httpApi:
    cors:
      allowedOrigins: "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PATCH
        - DELETE
        - OPTIONS
      maxAge: 300
  environment:
    NODE_ENV: production
    MONGODB_URI: ${env:MONGODB_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '7d'}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}

plugins:
  - serverless-esbuild
  - serverless-offline

package:
  patterns:
    - global-bundle.pem

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
  serverless-offline:
    httpPort: 3001
    lambdaPort: 3002
    noBanner: true

functions:
  # ── Health ──────────────────────────────────────────────────────────────────
  health:
    handler: src/handlers/health/check.handler
    events:
      - httpApi:
          path: /health
          method: GET

  # ── Auth ────────────────────────────────────────────────────────────────────
  authSignup:
    handler: src/handlers/auth/signup.handler
    events:
      - httpApi:
          path: /auth/signup
          method: POST

  authLogin:
    handler: src/handlers/auth/login.handler
    events:
      - httpApi:
          path: /auth/login
          method: POST

  authMe:
    handler: src/handlers/auth/me.handler
    events:
      - httpApi:
          path: /auth/me
          method: GET

  # ── Events (public) ─────────────────────────────────────────────────────────
  listEvents:
    handler: src/handlers/events/list.handler
    events:
      - httpApi:
          path: /events
          method: GET

  getEvent:
    handler: src/handlers/events/get.handler
    events:
      - httpApi:
          path: /events/{id}
          method: GET

  # ── Events (organizer) ──────────────────────────────────────────────────────
  listMyEvents:
    handler: src/handlers/events/mine.handler
    events:
      - httpApi:
          path: /events/mine
          method: GET

  createEvent:
    handler: src/handlers/events/create.handler
    events:
      - httpApi:
          path: /events
          method: POST

  updateEvent:
    handler: src/handlers/events/update.handler
    events:
      - httpApi:
          path: /events/{id}
          method: PATCH

  deleteEvent:
    handler: src/handlers/events/delete.handler
    events:
      - httpApi:
          path: /events/{id}
          method: DELETE

  cancelEvent:
    handler: src/handlers/events/cancel.handler
    events:
      - httpApi:
          path: /events/{id}/cancel
          method: PATCH

  republishEvent:
    handler: src/handlers/events/republish.handler
    events:
      - httpApi:
          path: /events/{id}/republish
          method: PATCH

  makeEventDraft:
    handler: src/handlers/events/draft.handler
    events:
      - httpApi:
          path: /events/{id}/draft
          method: PATCH

  # ── Registrations ───────────────────────────────────────────────────────────
  registerForEvent:
    handler: src/handlers/registrations/register.handler
    events:
      - httpApi:
          path: /events/{id}/register
          method: POST

  cancelRegistration:
    handler: src/handlers/registrations/cancel.handler
    events:
      - httpApi:
          path: /events/{id}/register
          method: DELETE

  listMyRegistrations:
    handler: src/handlers/registrations/mine.handler
    events:
      - httpApi:
          path: /registrations/mine
          method: GET

  # ── Attendees ───────────────────────────────────────────────────────────────
  listEventAttendees:
    handler: src/handlers/attendees/list.handler
    events:
      - httpApi:
          path: /events/{id}/attendees
          method: GET

  # ── Search ──────────────────────────────────────────────────────────────────
  parseSearch:
    handler: src/handlers/search/parse.handler
    timeout: 60
    events:
      - httpApi:
          path: /search/parse
          method: POST

# ── Infrastructure ────────────────────────────────────────────────────────────

resources:
  Resources:
    # Security group for Lambda functions. After the first deploy, copy the
    # exported LambdaSecurityGroupId from the CloudFormation stack outputs and
    # add it as an inbound rule on the DocumentDB cluster security group:
    #   Protocol: TCP  Port: 27017  Source: <LambdaSecurityGroupId>
    LambdaSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: ${self:service}-${sls:stage}-lambda
        VpcId: ${env:VPC_ID}
        Tags:
          - Key: Name
            Value: ${self:service}-${sls:stage}-lambda
          - Key: Stage
            Value: ${sls:stage}

  Outputs:
    LambdaSecurityGroupId:
      Description: >
        Add this SG as an inbound rule on the DocumentDB security group
        (TCP 27017) so Lambda can reach the cluster.
      Value:
        Fn::GetAtt: [LambdaSecurityGroup, GroupId]
      Export:
        Name: !Sub ${AWS::StackName}-LambdaSecurityGroupId
